# This is the project specific Settings.yml file.
# Place Sphinx specific build information here.
# Settings given here will replace the settings of 'conf.py'.


---
conf.py:
  copyright: 2010-2026
  project: Page Teaser (with Fluid)
  version: main
  release: main
  latex_documents:
  - - Index
    - pw_teaser.tex
    - 'Page Teaser (with Fluid)'
    - Armin Vieweg
    - manual
  latex_elements:
    papersize: a4paper
    pointsize: 10pt
    preamble: \usepackage{typo3}
  intersphinx_mapping:
    t3api:
    - https://docs.typo3.org/m/typo3/reference-coreapi/main/en-us/
    - null
    t3tsref:
    - https://docs.typo3.org/m/typo3/reference-typoscript/main/en-us/
    - null
    t3start:
    - https://docs.typo3.org/m/typo3/tutorial-getting-started/main/en-us/
    - null
    t3editors:
    - https://docs.typo3.org/m/typo3/tutorial-editor/main/en-us/
    - null
...
