name: Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit -c Tests/UnitTests.xml
