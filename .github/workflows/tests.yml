name: Tests

on:
  push:
  pull_request:

env:
  COMPOSER_PROCESS_TIMEOUT: 0
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_NO_AUDIT: 1

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.2'
            typo3-version: '^13.4'
          - php-version: '8.3'
            typo3-version: '^13.4'
          - php-version: '8.4'
            typo3-version: '^13.4'
          - php-version: '8.2'
            typo3-version: '^14.0'
          - php-version: '8.3'
            typo3-version: '^14.0'
          - php-version: '8.4'
            typo3-version: '^14.0'
    name: "Unit (PHP ${{ matrix.php-version }}, TYPO3 ${{ matrix.typo3-version }})"
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"

      - name: Install dependencies
        run: |
          composer require typo3/cms-core:${{ matrix.typo3-version }} --no-update
          composer update --no-interaction --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit -c Tests/UnitTests.xml

  functional:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.2'
            typo3-version: '^13.4'
          - php-version: '8.3'
            typo3-version: '^14.0'
    name: "Functional (PHP ${{ matrix.php-version }}, TYPO3 ${{ matrix.typo3-version }})"
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      typo3DatabaseName: test
      typo3DatabaseHost: 127.0.0.1
      typo3DatabaseUsername: root
      typo3DatabasePassword: root
      typo3DatabasePort: 3306
      typo3DatabaseDriver: mysqli
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-version }}"

      - name: Install dependencies
        run: |
          composer require typo3/cms-core:${{ matrix.typo3-version }} --no-update
          composer update --no-interaction --prefer-dist

      - name: Run functional tests
        run: vendor/bin/phpunit -c Tests/FunctionalTests.xml

  phpstan:
    runs-on: ubuntu-latest
    name: "PHPStan (Level 9)"
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  composer-validate:
    runs-on: ubuntu-latest
    name: "Composer Validate"
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Validate composer.json
        run: composer validate --strict --no-check-lock
